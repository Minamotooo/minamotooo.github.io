  description: "Presented BanglaHateCorpus — a unified Bangla hate speech dataset of 168K instances from 8 social media platforms, with a verification pipeline combining human-linguist review and LLM-as-judge scoring. Presented BanHateFormer, a lightweight Transformer with Mixture-of-Experts feed-forward layers targeting 91.33% F1-score at 94× smaller scale than BanglaBERT, toward deployable NLP-based content moderation for 242 million Bangla speakers."
