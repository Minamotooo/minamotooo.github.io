- title: "11th / 124, DL Sprint 4.0 — Bengali Long-Form ASR & Diarization"
  subtitle: "<span style='color: var(--global-text-color); font-style: italic; opacity: 0.6; text-decoration: underline;'>7th / 124 in</span> <a href='https://www.kaggle.com/competitions/dl-sprint-4-0-bengali-long-form-speech-recognition/leaderboard' target='_blank' style='margin-left: 4px;'><i class='fa-brands fa-kaggle' style='margin-right: 2px;'></i> ASR</a><br><span style='color: var(--global-text-color); font-style: italic; opacity: 0.6; text-decoration: underline;'>4th / 124 in</span> <a href='https://www.kaggle.com/competitions/dl-sprint-4-0-bengali-speaker-diarization-challenge/leaderboard' target='_blank' style='margin-left: 4px;'><i class='fa-brands fa-kaggle' style='margin-right: 2px;'></i> Diarization</a>"
  image: kaggle.jpeg
  award: "11th / 124 Overall"
  tags:
    - "DL Sprint 4.0"
    - "Kaggle"
  organization: "BUET CSE Fest 2026"
  date: "March 2026"
  description: "Tackled low-resource Natural Language Processing for Bengali long-form audio across two tracks: for <a href='https://www.kaggle.com/competitions/dl-sprint-4-0-bengali-long-form-speech-recognition/leaderboard' target='_blank'>ASR</a>, built WhisperAlign — a word-boundary-aware chunker using Whisper's cross-attention alignment heads — and fine-tuned a Whisper-medium Bengali ASR model; for <a href='https://www.kaggle.com/competitions/dl-sprint-4-0-bengali-speaker-diarization-challenge/leaderboard' target='_blank'>diarization</a>, applied Machine Learning domain adaptation by fine-tuning Pyannote's segmentation head on Bengali conversational speech, paired with a Dual-VAD intersection for noise-robust boundary detection.<br><a href='https://github.com/Minamotooo/Luck-Is-All-You-Need-DL-Sprint-4.0' target='_blank'><i class='fa-brands fa-github' style='margin-right: 4px;'></i>Code</a> · <a href='https://arxiv.org/abs/2603.04809' target='_blank'><i class='ai ai-arxiv' style='margin-right: 4px;'></i>Paper</a> · <a href='https://github.com/Minamotooo/Luck-Is-All-You-Need-DL-Sprint-4.0/blob/main/Presentation.pdf' target='_blank'><i class='fa-solid fa-file-powerpoint' style='margin-right: 4px;'></i>Slides</a>"
  keywords:
    - "Natural Language Processing"
    - "Machine Learning"
    - "WhisperAlign"
    - "cross-attention alignment heads"
    - "domain adaptation"
    - "Dual-VAD intersection"

- title: "1st Runner Up, ResearchSpark 3 Minute Thesis Competition"
