  organization: "Bangladesh University of Engineering and Technology (BUET)"
  date: "April 2026"
  description: "Curated BanglaHateCorpus — the largest unified Bangla hate speech dataset with 168K instances from 8 social media platforms, verified through a human-linguist + LLM-as-judge pipeline. Designed BanHateFormer, a lightweight Transformer with Mixture-of-Experts feed-forward layers that achieves 91.33% F1-score while being 94× smaller than BanglaBERT, making NLP-based content moderation deployable for 242 million Bangla speakers."
