  description: "Designed a real-time multimodal threat detection system that cross-validates social media text with government CCTV footage. The pipeline combines NLP-based rumor classification, CNN+RNN video frame analysis, and a confidence-scoring fusion module to categorize incidents into 16 threat classes — intersecting Computer Vision, Natural Language Processing, and Multimodal AI for public safety."
