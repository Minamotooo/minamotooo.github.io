    Projects:
      - name: MemoryLane
        summary: "PyTorch, ConvNeXt, U-Net, PatchGAN, VGG"
        url: https://github.com/Minamotooo/MemoryLane
        highlights:
          - Framed grayscale-to-color mapping as a conditional image generation problem in the CIELab color space, building a ConvNeXt-Base encoder -- U-Net decoder architecture.
          - Incorporated a PatchGAN discriminator and mitigated gray-mean saturation bias via colorfulness-filtered training on ~518K Places365 images.
          - Designed a composite perceptual + adversarial loss (VGG feature matching + PatchGAN) to balance global structure with local texture fidelity.
          - Surpassed ground-truth colorfulness (40.9 vs. 36.9) and generalized to real, out-of-distribution family photographs.
        start_date: 2026-04

