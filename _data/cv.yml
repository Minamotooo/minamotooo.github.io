    Projects:
      - name: Bengali Long-Form ASR and Diarization
        summary: "PyTorch, Whisper, Pyannote, Silero VAD, whisper-timestamped"
        url: https://github.com/Minamotooo/Luck-Is-All-You-Need-DL-Sprint-4.0
        highlights:
          - Built WhisperAlign — a word-boundary-aware chunker that extracts per-word timestamps from Whisper's own cross-attention alignment heads, requiring no external tools or boundary annotations, and greedily assembles fixed-length segments that never break mid-word.
          - Fine-tuned a Whisper-medium Bengali ASR model on the resulting chunks for low-resource Natural Language Processing.
          - Domain-adapted Pyannote for Bengali speaker diarization by fine-tuning only its segmentation head on Bengali conversational audio, without disturbing the language-agnostic embedding space.
          - Introduced a Dual-VAD intersection (Pyannote ∩ Silero VAD) retaining only segments confirmed by an independent speech boundary detector.
        start_date: 2026-03

      - name: MemoryLane
        summary: "PyTorch, ConvNeXt, U-Net, PatchGAN, VGG"
        url: https://github.com/Minamotooo/MemoryLane
        highlights:
          - Framed grayscale-to-color mapping as a Computer Vision problem of conditional image generation in the CIELab color space.
          - Built a ConvNeXt-Base encoder–U-Net decoder with a PatchGAN discriminator.
          - Addressed the gray-mean bias endemic to deep colorization models via colorfulness-filtered training data and a composite perceptual + adversarial loss (VGG + PatchGAN).
        start_date: 2026-04

